openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Travel Booking Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: flights
    description: Flight operations
  - name: buses
    description: Bus operations
  - name: hotels
    description: Hotel operations
  - name: packages
    description: Holiday package operations
  - name: bookings
    description: Booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /flights/search:
    get:
      operationId: searchFlights
      tags: [flights]
      summary: Search available flights
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: departureDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: returnDate
          in: query
          schema:
            type: string
            format: date
        - name: passengers
          in: query
          schema:
            type: integer
            default: 1
        - name: class
          in: query
          schema:
            type: string
            enum: [economy, business, first]
      responses:
        "200":
          description: List of available flights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flight"

  /flights:
    get:
      operationId: listFlights
      tags: [flights]
      summary: List all flights
      responses:
        "200":
          description: List of flights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flight"

  /flights/{id}:
    get:
      operationId: getFlight
      tags: [flights]
      summary: Get flight by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Flight details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flight"
        "404":
          description: Flight not found

  /buses/search:
    get:
      operationId: searchBuses
      tags: [buses]
      summary: Search available buses
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: departureDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: passengers
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of available buses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bus"

  /buses:
    get:
      operationId: listBuses
      tags: [buses]
      summary: List all buses
      responses:
        "200":
          description: List of buses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bus"

  /buses/{id}:
    get:
      operationId: getBus
      tags: [buses]
      summary: Get bus by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bus details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bus"
        "404":
          description: Bus not found

  /hotels/search:
    get:
      operationId: searchHotels
      tags: [hotels]
      summary: Search available hotels
      parameters:
        - name: location
          in: query
          required: true
          schema:
            type: string
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: guests
          in: query
          schema:
            type: integer
            default: 1
        - name: rooms
          in: query
          schema:
            type: integer
            default: 1
        - name: stars
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        "200":
          description: List of available hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"

  /hotels:
    get:
      operationId: listHotels
      tags: [hotels]
      summary: List all hotels
      responses:
        "200":
          description: List of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"

  /hotels/{id}:
    get:
      operationId: getHotel
      tags: [hotels]
      summary: Get hotel by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hotel details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "404":
          description: Hotel not found

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List holiday packages
      parameters:
        - name: destination
          in: query
          schema:
            type: string
        - name: duration
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [beach, adventure, cultural, luxury, family, honeymoon]
      responses:
        "200":
          description: List of holiday packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HolidayPackage"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get holiday package by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HolidayPackage"
        "404":
          description: Package not found

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Invalid booking data

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found
    delete:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [bookings]
      summary: Get booking stats summary
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /destinations/popular:
    get:
      operationId: getPopularDestinations
      tags: [packages]
      summary: Get popular travel destinations
      responses:
        "200":
          description: List of popular destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularDestination"

  /deals/featured:
    get:
      operationId: getFeaturedDeals
      tags: [packages]
      summary: Get featured travel deals
      responses:
        "200":
          description: List of featured deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeaturedDeal"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Flight:
      type: object
      properties:
        id:
          type: integer
        airline:
          type: string
        flightNumber:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureTime:
          type: string
        arrivalTime:
          type: string
        duration:
          type: string
        price:
          type: number
        class:
          type: string
          enum: [economy, business, first]
        seatsAvailable:
          type: integer
        stops:
          type: integer
        airlineLogoUrl:
          type: string
      required:
        - id
        - airline
        - flightNumber
        - origin
        - destination
        - departureTime
        - arrivalTime
        - duration
        - price
        - class
        - seatsAvailable
        - stops

    Bus:
      type: object
      properties:
        id:
          type: integer
        operator:
          type: string
        busNumber:
          type: string
        origin:
          type: string
        destination:
          type: string
        departureTime:
          type: string
        arrivalTime:
          type: string
        duration:
          type: string
        price:
          type: number
        busType:
          type: string
          enum: [sleeper, semi-sleeper, seater, ac, non-ac]
        seatsAvailable:
          type: integer
        amenities:
          type: array
          items:
            type: string
      required:
        - id
        - operator
        - busNumber
        - origin
        - destination
        - departureTime
        - arrivalTime
        - duration
        - price
        - busType
        - seatsAvailable

    Hotel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        address:
          type: string
        stars:
          type: integer
          minimum: 1
          maximum: 5
        rating:
          type: number
        reviewCount:
          type: integer
        pricePerNight:
          type: number
        imageUrl:
          type: string
        amenities:
          type: array
          items:
            type: string
        roomTypes:
          type: array
          items:
            type: string
        description:
          type: string
      required:
        - id
        - name
        - location
        - stars
        - rating
        - pricePerNight

    HolidayPackage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        destination:
          type: string
        duration:
          type: integer
        type:
          type: string
          enum: [beach, adventure, cultural, luxury, family, honeymoon]
        price:
          type: number
        originalPrice:
          type: number
        imageUrl:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        includes:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        description:
          type: string
        featured:
          type: boolean
      required:
        - id
        - name
        - destination
        - duration
        - type
        - price

    Booking:
      type: object
      properties:
        id:
          type: integer
        bookingType:
          type: string
          enum: [flight, bus, hotel, package]
        referenceId:
          type: integer
        status:
          type: string
          enum: [confirmed, pending, cancelled]
        passengerName:
          type: string
        passengerEmail:
          type: string
        passengerPhone:
          type: string
        totalPrice:
          type: number
        passengers:
          type: integer
        travelDate:
          type: string
        createdAt:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - id
        - bookingType
        - referenceId
        - status
        - passengerName
        - passengerEmail
        - totalPrice
        - passengers
        - travelDate

    CreateBookingBody:
      type: object
      properties:
        bookingType:
          type: string
          enum: [flight, bus, hotel, package]
        referenceId:
          type: integer
        passengerName:
          type: string
        passengerEmail:
          type: string
        passengerPhone:
          type: string
        passengers:
          type: integer
        travelDate:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - bookingType
        - referenceId
        - passengerName
        - passengerEmail
        - passengers
        - travelDate

    StatsSummary:
      type: object
      properties:
        totalBookings:
          type: integer
        flightBookings:
          type: integer
        busBookings:
          type: integer
        hotelBookings:
          type: integer
        packageBookings:
          type: integer
        totalRevenue:
          type: number
      required:
        - totalBookings
        - flightBookings
        - busBookings
        - hotelBookings
        - packageBookings
        - totalRevenue

    PopularDestination:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        imageUrl:
          type: string
        packageCount:
          type: integer
        startingPrice:
          type: number
        rating:
          type: number
      required:
        - id
        - name
        - country
        - packageCount
        - startingPrice

    FeaturedDeal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [flight, bus, hotel, package]
        originalPrice:
          type: number
        discountedPrice:
          type: number
        discountPercent:
          type: integer
        imageUrl:
          type: string
        validUntil:
          type: string
        referenceId:
          type: integer
      required:
        - id
        - title
        - type
        - originalPrice
        - discountedPrice
        - discountPercent
        - referenceId
